name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review only the changes in pull request ${{ github.repository }}/pull/${{ github.event.pull_request.number }}.

            Start with `gh pr diff` and read the root CLAUDE.md once. Inspect only
            changed files and the minimum surrounding context needed to validate a
            concrete concern. Do not launch subagents, inspect unrelated files, run
            tests or builds, or perform broad repository searches.

            Report only high-confidence bugs, regressions, security issues, or
            explicit CLAUDE.md violations. Ignore style preferences and speculative
            concerns. Post exactly one concise result using `gh pr comment`: list
            actionable findings with file and line references, or state that no
            issues were found. Stop after posting the comment.
          claude_args: '--model claude-haiku-4-5 --max-budget-usd 0.10 --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"'
          show_full_output: true
